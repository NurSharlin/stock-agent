name: Daily Stock Agent

on:
  schedule:
    - cron: '0 12 * * 1-5'  # 1:30 PM UTC = ~8:30 AM ET, weekdays only
    - cron: '*/15 * * * *'     # Check for buy/sell messages every 15 min
  workflow_dispatch:

jobs:
  run-agent:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install yfinance anthropic requests

      - name: Run stock agent
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.MY_GITHUB_TOKEN }}
          GITHUB_REPO: ${{ github.repository }}
          LANGUAGE: "Hebrew"
          MODE: ${{ github.event.schedule == '30 13 * * 1-5' && 'report' || 'listen' }}
        run: python stock_agent.py
